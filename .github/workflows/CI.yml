name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

env:
  OXC_LOG: 'debug'
  DEBUG: '@swc-node'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]

    name: stable - ${{ matrix.os }} - node@${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: 'Install dependencies'
        run: pnpm install -r

      - name: Build TypeScript
        run: pnpm build

      - name: Test bindings
        # Force bash on Windows too: with the default PowerShell shell only the
        # last command's exit code surfaces, so a failing `pnpm test` would be
        # masked by a passing `pnpm test:module` and the job would go green.
        shell: bash
        run: |
          pnpm test
          pnpm test:jest
          pnpm test:module

  publish:
    name: Publish
    permissions:
      contents: write
      id-token: write
    if: "startsWith(github.event.head_commit.message, 'chore(release): publish')"
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: 'Install dependencies'
        run: pnpm install

      - name: Build TypeScript
        run: |
          pnpm build
          rm ./packages/**/*.tsbuildinfo

      - name: Publish
        run: |
          npm install -g npm
          pnpm publish -r --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
